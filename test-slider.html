<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Before/After Slider Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --background: hsl(0 0% 3.9%);
      --foreground: hsl(0 0% 98%);
      --muted: hsl(0 0% 14.9%);
      --muted-fg: hsl(0 0% 63.9%);
      --border: hsl(0 0% 14.9%);
      --radius: 0.5rem;
    }

    body {
      background: var(--background);
      color: var(--foreground);
      font-family: -apple-system, sans-serif;
      padding: 48px 24px;
      max-width: 760px;
      margin: 0 auto;
    }

    h2 {
      font-size: 14px;
      color: var(--muted-fg);
      margin-bottom: 16px;
      font-weight: 500;
    }

    /* ── Before/After slider ── */
    .compare-slider {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: calc(var(--radius) + 4px);
      border: 1px solid var(--border);
      margin: 0 0 48px;
      cursor: ew-resize;
      user-select: none;
      -webkit-user-select: none;
    }

    .compare-after {
      position: absolute;
      inset: 0;
    }

    .compare-before {
      position: absolute;
      inset: 0;
      clip-path: inset(0 50% 0 0);
    }

    .compare-after img,
    .compare-before img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .compare-divider {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      background: rgba(255, 255, 255, 0.9);
      transform: translateX(-50%);
      pointer-events: none;
    }

    .compare-knob {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #fff;
      border: none;
      cursor: ew-resize;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: all;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    }

    .compare-knob svg {
      width: 16px;
      height: 16px;
      color: #111;
      display: block;
    }

    .compare-label {
      position: absolute;
      bottom: 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 3px 8px;
      border-radius: 4px;
      pointer-events: none;
    }

    .compare-before .compare-label { left: 12px; }
    .compare-after .compare-label { right: 12px; }

    /* Placeholder fills (swap with <img> when you have screenshots) */
    .compare-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--muted-fg);
    }

    .compare-before .compare-placeholder {
      background: hsl(220 15% 18%);
    }

    .compare-after .compare-placeholder {
      background: hsl(220 15% 11%);
    }
  </style>
</head>
<body>

  <h2>Helpdesk redesign — drag to compare</h2>

  <div class="compare-slider">
    <div class="compare-after">
      <img src="/assets/inbox-after-collapsed.png" alt="After redesign">
      <span class="compare-label">After</span>
    </div>
    <div class="compare-before">
      <img src="/assets/inbox-before.png" alt="Before redesign">
      <span class="compare-label">Before</span>
    </div>
    <div class="compare-divider">
      <button class="compare-knob" aria-label="Drag to compare">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 14 2 10 6 6"/>
          <polyline points="14 6 18 10 14 14"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    document.querySelectorAll('.compare-slider').forEach(slider => {
      let dragging = false;

      const update = (clientX) => {
        const rect = slider.getBoundingClientRect();
        const pct = Math.max(3, Math.min(97, (clientX - rect.left) / rect.width * 100));
        slider.querySelector('.compare-before').style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
        slider.querySelector('.compare-divider').style.left = `${pct}%`;
      };

      slider.addEventListener('mousedown', (e) => { dragging = true; update(e.clientX); });
      window.addEventListener('mousemove', (e) => { if (dragging) update(e.clientX); });
      window.addEventListener('mouseup', () => { dragging = false; });

      slider.addEventListener('touchstart', (e) => { dragging = true; update(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
      window.addEventListener('touchmove', (e) => { if (dragging) update(e.touches[0].clientX); }, { passive: true });
      window.addEventListener('touchend', () => { dragging = false; });
    });
  </script>

</body>
</html>
