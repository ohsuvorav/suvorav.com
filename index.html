<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Oleg Suvorov — Product Manager">
  <title>Oleg Suvorov</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0F0F0F;
      --surface: #161616;
      --border: rgba(255,255,255,0.07);
      --text: #FFFFFF;
      --muted: #777777;
      --accent: #5E6AD2;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Nav ── */
    nav {
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
    }

    nav .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-links a:hover { color: var(--text); }

    /* ── Hero ── */
    .hero {
      padding: 80px 0 72px;
      border-bottom: 1px solid var(--border);
    }

    .hero-role {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: 42px;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 24px;
    }

    .hero-bio {
      font-size: 16px;
      line-height: 1.7;
      color: #999999;
      max-width: 560px;
    }

    .hero-bio a {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .hero-links {
      margin-top: 36px;
      display: flex;
      gap: 16px;
    }

    .hero-links a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 6px;
      transition: color 0.15s, border-color 0.15s;
    }

    .hero-links a:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.2);
    }

    /* ── Case Studies ── */
    .section {
      padding: 64px 0;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 40px;
    }

    .case-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .case-item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 24px;
      padding: 24px 0;
      border-top: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: opacity 0.15s;
    }

    .case-item:hover { opacity: 0.7; }

    .case-company {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .case-title {
      font-size: 17px;
      font-weight: 500;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }

    .case-desc {
      font-size: 14px;
      color: #666666;
      line-height: 1.6;
    }

    .case-tags {
      display: flex;
      gap: 6px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .case-meta {
      text-align: right;
      flex-shrink: 0;
    }

    .case-year {
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Work History ── */
    .work-list {
      display: flex;
      flex-direction: column;
    }

    .work-item {
      display: grid;
      grid-template-columns: 1fr auto;
      padding: 20px 0;
      border-top: 1px solid var(--border);
    }

    .work-company {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 3px;
    }

    .work-role {
      font-size: 13px;
      color: var(--muted);
    }

    .work-period {
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Footer ── */
    footer {
      padding: 48px 0;
    }

    footer .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-name {
      font-size: 13px;
      color: var(--muted);
    }

    .footer-links {
      display: flex;
      gap: 20px;
    }

    .footer-links a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }

    .footer-links a:hover { color: var(--text); }

    @media (max-width: 600px) {
      .hero h1 { font-size: 30px; }
      .case-item { grid-template-columns: 1fr; }
      .case-meta { display: none; }
    }
  </style>
</head>
